name: Build bundle
on:
  workflow_dispatch:
    inputs:
      url:        {description: "Site URL to crawl", required: true}
      name:       {description: "Bundle name (kebab-case)", required: true, default: "my-bundle"}
      max_depth:  {description: "Max crawl depth", required: true, default: "3"}
      max_pages:  {description: "Max pages", required: true, default: "200"}
      js:         {description: "Render JavaScript (true/false)", required: true, default: "false"}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install ${{ inputs.js == 'true' && "'okf-kit[js]'" || 'okf-kit' }}
      - if: ${{ inputs.js == 'true' }}
        run: python -m playwright install --with-deps chromium
      - name: Build
        run: |
          okf build "${{ inputs.url }}" -o "${{ inputs.name }}" \
            --max-depth ${{ inputs.max_depth }} --max-pages ${{ inputs.max_pages }} \
            ${{ inputs.js == 'true' && '--js' || '' }}
      - name: Commit bundle
        run: |
          git config user.name okf-bot
          git config user.email okf-bot@users.noreply.github.com
          git add -A && git commit -m "build ${{ inputs.name }} from ${{ inputs.url }}" && git push
      - name: Release zip
        env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          okf zip "${{ inputs.name }}" -o "${{ inputs.name }}-okf.zip"
          gh release create v0.1.0 "${{ inputs.name }}-okf.zip" --title "${{ inputs.name }} v0.1.0" \
            --notes "OKF bundle. Get it: okf get ${{ inputs.name }}" || \
          gh release upload v0.1.0 "${{ inputs.name }}-okf.zip" --clobber
